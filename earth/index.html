        left: 0;
        right: 0;
        height: 32px;
        background: rgba(0, 0, 0, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);

        display: flex;
        align-items: center;
        overflow: hidden;
      }
      .live-dot {
        width: 6px;
        height: 6px;
        background: #ff3b3b;
        border-radius: 50%;
        margin: 0 10px 0 16px;
        animation: pulse-dot 1.5s infinite;
        flex-shrink: 0;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .live-label {
        font-size: 9px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #ff3b3b;
        margin-right: 16px;
        flex-shrink: 0;
      }
      .ticker-track {
        display: flex;
        animation: scroll-ticker 360s linear infinite;
        white-space: nowrap;
      }
      @keyframes scroll-ticker {
        0% {

        100% {
          transform: translateX(-50%);

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        const fontSize = 42;
        ctx.font = `600 ${fontSize}px Inter, Arial, sans-serif`;
        const metrics = ctx.measureText(text);
        const textWidth = metrics.width;
        const padding = 20;
        canvas.width = textWidth + padding * 2;
        canvas.height = fontSize + padding * 2;

        // Redraw with correct size
        ctx.font = `600 ${fontSize}px Inter, Arial, sans-serif`;
        ctx.fillStyle = "rgba(0,0,0,0.45)";
        ctx.roundRect(0, 0, canvas.width, canvas.height, 8);
        ctx.fill();
        ctx.fillStyle = "#ffffff";
        ctx.textBaseline = "middle";
        ctx.textAlign = "center";
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        const spriteMat = new THREE.SpriteMaterial({
          map: texture,
          transparent: true,
          depthTest: false,
          depthWrite: false,
          opacity: 0.9,
        });
        const sprite = new THREE.Sprite(spriteMat);
        const aspect = canvas.width / canvas.height;
        const scale = 0.08;
        sprite.scale.set(scale * aspect, scale, 1);
        return sprite;

      function onMouseMove(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const dots = markers.map((m) => m.dot);
        const intersects = raycaster.intersectObjects(dots);

        if (intersects.length > 0) {
          const hit = intersects[0].object;
          const m = markers.find((m) => m.dot === hit);
          if (m) {
            hoveredMarker = m;
            document.body.style.cursor = "pointer";
            tooltip.classList.add("visible");
            tooltip.style.left = e.clientX + 16 + "px";
            tooltip.style.top = e.clientY - 10 + "px";
            ttName.textContent = m.data.name;
            ttCount.textContent = `${m.data.news.length} AI stories · Index: ${m.data.aiIndex}`;
            // Highlight
            m.dot.material.color.setHex(0xffffff);
          }
        } else {
          if (hoveredMarker) {
            hoveredMarker.dot.material.color.setHex(0x64b4ff);
            hoveredMarker = null;
          }
          document.body.style.cursor = "default";
          tooltip.classList.remove("visible");
        }
      }

      function onClick(e) {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const dots = markers.map((m) => m.dot);
        const intersects = raycaster.intersectObjects(dots);

        if (intersects.length > 0) {
          const hit = intersects[0].object;
          const m = markers.find((m) => m.dot === hit);
          if (m) {
            showCountryPanel(m.data);
            // Smooth rotate to country
            controls.autoRotate = false;
            setTimeout(() => {
              controls.autoRotate = true;
            }, 8000);
          }
        }
      }

      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("click", onClick);

      // Touch support
      window.addEventListener("touchend", (e) => {
        if (e.changedTouches.length > 0) {
          const t = e.changedTouches[0];
          onClick({ clientX: t.clientX, clientY: t.clientY });
        }
      });

      // Nav arrows: rotate globe
      let navIdx = 0;
      document.getElementById("navLeft").addEventListener("click", () => {
        navIdx = (navIdx - 1 + countries.length) % countries.length;
        showCountryPanel(countries[navIdx]);
      });
      document.getElementById("navRight").addEventListener("click", () => {
        navIdx = (navIdx + 1) % countries.length;
        showCountryPanel(countries[navIdx]);
      });

      // ─── LIVE NEWS FETCHING VIA RSS ──────────────────────────────
      // We attempt to fetch real AI news via public RSS-to-JSON services
      async function fetchLiveNews() {
        const feeds = [
          {
            url: "https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=artificial+intelligence&hl=en-US&gl=US&ceid=US:en",
            region: "Global",
          },
        ];
        try {
          for (const feed of feeds) {
            const resp = await fetch(feed.url);
            if (resp.ok) {
              const data = await resp.json();
              if (data.items && data.items.length > 0) {
                // Add live items to ticker
                const liveItems = data.items.slice(0, 10).map((item) => {
                  const title = item.title
                    .replace(/<[^>]*>/g, "")
                    .substring(0, 100);
                  return `<span class="ticker-item"><span class="country-tag">LIVE</span>${title}</span>`;
                });
                tickerTrack.innerHTML =
                  liveItems.join("") + tickerTrack.innerHTML;
              }
            }
          }
        } catch (e) {
          console.log("RSS fetch unavailable, using curated data");
        }
      }
      fetchLiveNews();
      // Refresh every 5 minutes
      setInterval(fetchLiveNews, 300000);

      // ─── CONNECTION ARCS ─────────────────────────────────────────
      // Draw subtle arcs between top AI countries
      const arcPairs = [
        [0, 1],
        [0, 3],
        [0, 6],
        [1, 7],
        [4, 3],
        [8, 11],
        [0, 21],
        [1, 21],
        [0, 10],
      ];
      arcPairs.forEach(([a, b], i) => {
        const pA = latLonToVec3(countries[a].lat, countries[a].lon, 1.01);
        const pB = latLonToVec3(countries[b].lat, countries[b].lon, 1.01);
        const mid = pA.clone().add(pB).multiplyScalar(0.5);
        const dist = pA.distanceTo(pB);
        mid.normalize().multiplyScalar(1.0 + dist * 0.25);

        const curve = new THREE.QuadraticBezierCurve3(pA, mid, pB);
        const points = curve.getPoints(48);
        const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({
          color: 0x3366aa,
          transparent: true,
          opacity: 0.12,
        });
        const line = new THREE.Line(lineGeo, lineMat);
        line.name = `arc-${i}`;
        scene.add(line);
      });

      // ─── ANIMATION LOOP ─────────────────────────────────────────
      let time = 0;

      // Temp vectors for label visibility
      const _labelWorldPos = new THREE.Vector3();
      const _camDir = new THREE.Vector3();

      function animate() {
        time += 0.01;

        earth.rotation.y += 0.001;
        clouds.rotation.y += 0.0014;
        markerGroup.rotation.y = earth.rotation.y;
        labelGroup.rotation.y = earth.rotation.y;

        // Label visibility (hide labels facing away from camera)
        markers.forEach((m, i) => {
          // Label facing check
          if (m.label) {
            m.label.getWorldPosition(_labelWorldPos);
            _camDir.copy(camera.position).normalize();
            const dot = _labelWorldPos.normalize().dot(_camDir);
            // Smoothly fade labels based on facing direction
            const targetOpacity = dot > 0.15 ? 0.9 : 0;
            m.label.material.opacity +=
              (targetOpacity - m.label.material.opacity) * 0.1;
            m.label.material.visible = m.label.material.opacity > 0.01;
          }
        });

        // Subtle star twinkle
        starsMat.opacity = 0.7 + Math.sin(time * 1.5) * 0.1;

        controls.update();
        renderer.render(scene, camera);
      }
      renderer.setAnimationLoop(animate);

      // ─── RESIZE ──────────────────────────────────────────────────
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // Keyboard shortcuts
      window.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          e.preventDefault();
          controls.autoRotate = !controls.autoRotate;
        }
        if (e.code === "Escape") {
          infoPanel.classList.remove("active");
        }
      });
    </script>
  </body>
</html>
