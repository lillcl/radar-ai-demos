<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radar AI — Cool Experiences</title>
    <meta name="theme-color" content="#1C2420" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      /* =========================================================
         PALETTE
         ========================================================= */
      :root {
        --deep-background: #1C2420;
        --shadow-layer: #2D3733;
        --ambient-mist: #4D5D57;
        --cyan-core: #A6DBDC;
        --cyan-secondary: #89BCBD;
        --white-highlight: #F8FCFC;
        --electric-green: #00FF5A;
        --neon-green: #23E85F;
        --acid-green: #4CFF6A;
        --green-reflection: #71C980;

        --font-display: "Outfit", system-ui, -apple-system, "Segoe UI", sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, monospace;

        --ease: cubic-bezier(0.22, 1, 0.36, 1);
        --focus-ring: 0 0 0 2px var(--deep-background),
          0 0 0 4px var(--neon-green);
      }

      /* =========================================================
         RESET
         ========================================================= */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      button {
        font: inherit;
        color: inherit;
        background: none;
        border: 0;
        cursor: pointer;
      }

      /* =========================================================
         BASE
         ========================================================= */
      body {
        background: var(--deep-background);
        color: var(--white-highlight);
        font-family: var(--font-display);
        font-weight: 400;
        font-size: 15px;
        line-height: 1.6;
        min-height: 100dvh;
        position: relative;
        isolation: isolate;
      }

      /* =========================================================
         BACKGROUND ATMOSPHERE LAYERS
         ========================================================= */
      .bg-fog,
      .bg-energy,
      .bg-grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -2;
      }

      .bg-fog {
        background:
          radial-gradient(
            900px 700px at 20% 30%,
            rgba(45, 55, 51, 0.55) 0%,
            transparent 60%
          ),
          radial-gradient(
            1100px 800px at 80% 70%,
            rgba(77, 93, 87, 0.4) 0%,
            transparent 65%
          ),
          radial-gradient(
            700px 600px at 50% 100%,
            rgba(45, 55, 51, 0.6) 0%,
            transparent 70%
          ),
          radial-gradient(
            600px 500px at 95% 10%,
            rgba(77, 93, 87, 0.25) 0%,
            transparent 60%
          );
        z-index: -3;
      }

      .bg-energy {
        background:
          radial-gradient(
            600px 500px at 65% 50%,
            rgba(35, 232, 95, 0.07) 0%,
            transparent 60%
          ),
          radial-gradient(
            500px 450px at 30% 60%,
            rgba(166, 219, 220, 0.06) 0%,
            transparent 60%
          );
        z-index: -2;
      }

      .bg-grain {
        opacity: 0.06;
        mix-blend-mode: overlay;
        z-index: 50;
        pointer-events: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      }

      /* =========================================================
         CANVAS
         ========================================================= */
      #scene-canvas {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        display: block;
      }

      /* =========================================================
         NAV
         ========================================================= */
      .nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 60;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 22px clamp(20px, 4vw, 48px);
      }
      .nav__brand {
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--white-highlight);
      }
      .nav__brand .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--neon-green);
        margin-left: 6px;
        box-shadow: 0 0 8px rgba(35, 232, 95, 0.6);
        vertical-align: middle;
      }
      .nav__links {
        display: flex;
        gap: 28px;
        align-items: center;
      }
      .nav__link {
        font-size: 12.5px;
        font-weight: 400;
        letter-spacing: 0.04em;
        color: rgba(248, 252, 252, 0.72);
        transition: color 0.3s var(--ease);
        position: relative;
      }
      .nav__link::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        width: 0;
        height: 1px;
        background: var(--neon-green);
        transition: width 0.4s var(--ease);
      }
      .nav__link:hover {
        color: var(--white-highlight);
      }
      .nav__link:hover::after {
        width: 100%;
      }
      .nav__link:focus-visible {
        outline: none;
        color: var(--white-highlight);
        box-shadow: var(--focus-ring);
        border-radius: 4px;
      }
      .nav__cta {
        font-size: 12.5px;
        font-weight: 500;
        letter-spacing: 0.04em;
        padding: 10px 18px;
        border-radius: 999px;
        border: 1px solid rgba(166, 219, 220, 0.35);
        background: rgba(35, 232, 95, 0.05);
        color: var(--white-highlight);
        transition: all 0.3s var(--ease);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .nav__cta:hover {
        background: rgba(35, 232, 95, 0.18);
        border-color: var(--neon-green);
        box-shadow: 0 0 24px rgba(35, 232, 95, 0.25);
      }
      .nav__cta:focus-visible {
        outline: none;
        border-color: var(--neon-green);
        box-shadow: var(--focus-ring);
      }

      /* =========================================================
         HERO
         ========================================================= */
      .hero {
        position: relative;
        z-index: 10;
        min-height: 100dvh;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 0 clamp(20px, 4vw, 48px);
        pointer-events: none;
      }
      .hero > * {
        pointer-events: auto;
      }

      .hero__copy {
        max-width: 640px;
        margin-bottom: clamp(28px, 5vh, 56px);
      }
      .hero__eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--cyan-core);
        margin-bottom: 24px;
        opacity: 0.85;
      }
      .hero__eyebrow .ping {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--neon-green);
        box-shadow: 0 0 8px rgba(35, 232, 95, 0.7);
        animation: ping 2.4s ease-in-out infinite;
      }
      @keyframes ping {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .hero__title {
        font-family: var(--font-display);
        font-weight: 500;
        font-size: clamp(40px, 7vw, 96px);
        line-height: 0.96;
        letter-spacing: -0.035em;
        color: var(--white-highlight);
        margin-bottom: 24px;
      }
      .hero__title .line {
        display: block;
      }
      .hero__title .accent {
        color: var(--cyan-core);
        font-style: italic;
        font-weight: 400;
      }
      .hero__sub {
        font-size: clamp(15px, 1.2vw, 17px);
        line-height: 1.65;
        color: rgba(248, 252, 252, 0.62);
        max-width: 480px;
        font-weight: 300;
      }

      .hero__ctas {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: clamp(28px, 5vh, 56px);
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-family: var(--font-display);
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.01em;
        padding: 14px 22px;
        border-radius: 999px;
        transition: all 0.3s var(--ease);
        white-space: nowrap;
      }
      .btn--primary {
        background: var(--neon-green);
        color: var(--deep-background);
        box-shadow: 0 0 0 0 rgba(35, 232, 95, 0.4);
      }
      .btn--primary:hover {
        background: var(--acid-green);
        box-shadow: 0 0 32px rgba(35, 232, 95, 0.45);
        transform: translateY(-1px);
      }
      .btn--primary:focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }
      .btn--secondary {
        color: var(--white-highlight);
        border: 1px solid rgba(166, 219, 220, 0.3);
        background: rgba(248, 252, 252, 0.04);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      .btn--secondary:hover {
        border-color: var(--cyan-core);
        background: rgba(166, 219, 220, 0.08);
      }
      .btn--secondary:focus-visible {
        outline: none;
        border-color: var(--cyan-core);
        box-shadow: var(--focus-ring);
      }
      .btn--icon {
        width: 46px;
        height: 46px;
        padding: 0;
        justify-content: center;
        color: var(--cyan-core);
        border: 1px solid rgba(166, 219, 220, 0.25);
        background: rgba(248, 252, 252, 0.03);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        border-radius: 50%;
      }
      .btn--icon:hover {
        color: var(--neon-green);
        border-color: var(--neon-green);
      }
      .btn--icon:focus-visible {
        outline: none;
        border-color: var(--neon-green);
        color: var(--neon-green);
        box-shadow: var(--focus-ring);
      }
      .btn .arrow {
        font-family: var(--font-mono);
        font-size: 13px;
        line-height: 1;
      }

      /* =========================================================
         NEXT SECTION HINT
         ========================================================= */
      .next-hint {
        position: relative;
        z-index: 10;
        width: 100%;
        padding: 60px clamp(20px, 4vw, 48px) 48px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        pointer-events: none;
      }
      .next-hint__line {
        width: 1px;
        height: 28px;
        background: linear-gradient(
          to bottom,
          transparent,
          rgba(166, 219, 220, 0.45)
        );
      }
      .next-hint__label {
        font-family: var(--font-mono);
        font-size: 10.5px;
        font-weight: 500;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: rgba(248, 252, 252, 0.4);
      }

      /* =========================================================
         RESPONSIVE
         ========================================================= */
      @media (min-width: 900px) {
        .hero {
          display: grid;
          grid-template-columns: 1fr 1fr;
          align-content: end;
        }
        .hero__copy {
          grid-column: 1;
          grid-row: 1;
        }
        .hero__ctas {
          grid-column: 2;
          grid-row: 1;
          justify-self: end;
          align-self: end;
        }
      }

      @media (max-width: 900px) {
        .nav__links {
          gap: 16px;
        }
        .nav__link {
          font-size: 11.5px;
        }
        .nav__cta {
          padding: 8px 14px;
          font-size: 11.5px;
        }
        .hero {
          padding-top: 80px;
          padding-bottom: 0;
        }
        .hero__copy {
          margin-bottom: 40px;
        }
        .hero__ctas {
          margin-bottom: 40px;
          gap: 10px;
          flex-wrap: wrap;
          justify-content: flex-start;
        }
        .btn {
          padding: 12px 18px;
          font-size: 13px;
        }
      }

      @media (max-width: 560px) {
        .nav__links {
          display: none;
        }
        .nav__brand {
          font-size: 12px;
        }
        .hero__title {
          font-size: clamp(36px, 11vw, 56px);
        }
        .hero__sub {
          font-size: 14px;
        }
        .hero__ctas {
          width: 100%;
        }
        .btn--icon {
          margin-left: auto;
        }
        .next-hint {
          padding: 36px 20px 28px;
        }
      }

      /* =========================================================
         REDUCED MOTION
         ========================================================= */
      @media (prefers-reduced-motion: reduce) {
        .hero__eyebrow .ping {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-fog"></div>
    <div class="bg-energy"></div>

    <canvas id="scene-canvas"></canvas>
    <div class="bg-grain"></div>

    <nav class="nav" aria-label="Primary">
      <span class="nav__brand">Radar <span class="dot"></span></span>
      <div class="nav__links">
        <a class="nav__link" href="#">Home</a>
        <a class="nav__link" href="#">Cases</a>
        <a class="nav__link" href="#">Library</a>
        <a class="nav__link" href="#">Resources</a>
        <a class="nav__cta" href="#">Let's Talk</a>
      </div>
    </nav>

    <main class="hero">
      <div class="hero__copy">
        <div class="hero__eyebrow">
          <span class="ping"></span>
          <span>Studio · 2026</span>
        </div>
        <h1 class="hero__title">
          <span class="line">We're Building</span>
          <span class="line"><span class="accent">Cool</span> Experiences.</span>
        </h1>
        <p class="hero__sub">
          Crafting immersive digital stories with kinetic systems, spatial
          interfaces, and responsive motion.
        </p>
      </div>

      <div class="hero__ctas">
        <button class="btn btn--primary" type="button">
          Get Started <span class="arrow">→</span>
        </button>
        <button class="btn btn--secondary" type="button">Contact Us</button>
        <button
          class="btn btn--icon"
          type="button"
          aria-label="More"
          title="More"
        >
          <svg
            width="14"
            height="14"
            viewBox="0 0 14 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <path
              d="M7 2.5V11.5M2.5 7H11.5"
              stroke="currentColor"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
        </button>
      </div>
    </main>

    <div class="next-hint" aria-hidden="true">
      <div class="next-hint__line"></div>
      <span class="next-hint__label">Hover to populate</span>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
    <script type="module" src="./scene.js"></script>
  </body>
</html>
