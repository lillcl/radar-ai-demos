<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxel Morph Guitar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }
    #ui { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10; }
    .variation-btn { padding: 10px 24px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: rgba(255,255,255,0.85); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.5px; text-transform: uppercase; }
    .variation-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); }
    .variation-btn.active { transform: scale(1.02); background: rgba(139,90,43,0.9); border-color: rgba(210,105,30,0.9); color: #fff; }
    .variation-btn[data-variation="1"].active { background: rgba(192,192,192,0.15); border-color: rgba(192,192,192,0.5); color: #C0C0C0; }
    .variation-btn[data-variation="2"].active { background: rgba(74,144,217,0.2); border-color: rgba(74,144,217,0.6); color: #4A90D9; }
    #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0a0a0f; color: rgba(255,255,255,0.6); font-size: 16px; letter-spacing: 2px; z-index: 100; transition: opacity 0.5s ease; }
    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="app"><div id="loading">Loading...</div></div>
  <div id="ui">
    <button class="variation-btn active" data-variation="0">Acoustic</button>
    <button class="variation-btn" data-variation="1">Electric</button>
    <button class="variation-btn" data-variation="2">Bass</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="scene.js"></script>
</body>
</html>
